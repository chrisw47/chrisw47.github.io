{{ define "main" }}
<div class="container">

  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
  </div>

  {{ if .Pages }}
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <a class="post-item-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="post-item-date">{{ .Date.Format "Jan 2006" }}</span>
      {{ with .Params.description }}
      <p class="post-item-desc">{{ . }}</p>
      {{ end }}
    </li>
    {{ end }}
  </ul>
  {{ else }}
  <p style="color: var(--text-muted);">Nothing here yet.</p>
  {{ end }}

</div>
{{ end }}
