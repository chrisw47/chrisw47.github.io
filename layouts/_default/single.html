{{ define "main" }}
<div class="container">

  <a class="back-link" href="{{ .Parent.RelPermalink }}">← {{ .Parent.Title }}</a>

  <article>
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">
          {{ .Date.Format "January 2, 2006" }}
        </time>
        {{ range .Params.tags }}
        <span class="post-tag">{{ . }}</span>
        {{ end }}
      </div>
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>
  </article>

</div>
{{ end }}
